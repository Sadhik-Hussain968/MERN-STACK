<!DOCTYPE html>
<html >
<head>
    <title>Student registration form</title>
    <link rel="stylesheet" href="reg form.css">
</head>
<body>
<h2>Student Registration Form</h2>
<form>
Name:
<br>
<br>
<input type="text" placeholder=" enter your Name">
<br><br>
Email:
<br>
<br>
<input type="email" placeholder=" enter your email">
<br><br>
Password:
<br>
<br>
<input type="password" placeholder=" enter your password">
<br><br>
Gender:
<br>
<br>
<input type="radio" placeholder=" Gender"> Male
<br>
<br>
<input type="radio" placeholder=" Gender"> Female
<br>
<br>
<input type="radio" placeholder=" Gender"> other
<br><br>
Skills:
<br>
<br>
<input type="checkbox" placeholder=" HTML"> HTML
<br>
<br>
<input type="checkbox" placeholder=" CSS"> CSS
<br><br>
Message:
<br>
<br>
<textarea rows=" 4" cols="30" placeholder="Write a message"></textarea>
<br><br>
Submit Button:
<br><br>
<input type="submit">
<br>   


</form>

</body>
</html>
